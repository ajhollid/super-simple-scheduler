name: Publish to NPM
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          # REMOVE registry-url entirely

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Publish to NPM
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org/
